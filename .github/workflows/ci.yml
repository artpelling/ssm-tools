name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Lint — no build dependency
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run ruff check
        run: uv run --only-dev ruff check

      - name: Run ruff format check
        run: uv run --only-dev ruff format --check

  # ---------------------------------------------------------------------------
  # Build ssmsolve-rs wheels — one artifact per (os, python-version)
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      # BLAS setup — platform-specific.
      # Linux: libopenblas-dev exposes a pkg-config entry picked up by build.rs.
      # macOS: build.rs links the Accelerate framework automatically — no setup needed.
      # Windows: vcpkg provides MSVC-compatible import libraries; BLAS_LIB_DIR
      #          triggers the env-override branch in build.rs (step 1 of 4).
      - name: Install OpenBLAS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libopenblas-dev

      - name: Install OpenBLAS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install openblas:x64-windows
          "BLAS_LIB_DIR=C:\vcpkg\installed\x64-windows\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\vcpkg\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build ssmsolve-rs wheel
        run: uv run maturin build --release --manifest-path packages/ssmsolve-rs/Cargo.toml --out packages/ssmsolve-rs/dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: ssmsolve-rs-${{ matrix.os }}-py${{ matrix.python-version }}
          path: packages/ssmsolve-rs/dist/*.whl
          if-no-files-found: error

      - name: Smoke test ssmsolve-rs
        shell: bash
        run: uv run --isolated --no-project --with packages/ssmsolve-rs/dist/*.whl python -c "from ssmsolve_rs import solve_f32, solve_f64; print('ssmsolve-rs OK')"

      - name: Smoke test ssmsolve
        shell: bash
        run: uv run --isolated --no-project --with packages/ssmsolve-rs/dist/*.whl --with packages/ssmsolve python -c "from ssmsolve.models import StateSpaceModel; print('ssmsolve OK')"

  # ---------------------------------------------------------------------------
  # Tests — depends on build, reuses ubuntu wheel artifacts
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download ssmsolve-rs wheel
        uses: actions/download-artifact@v8
        with:
          name: ssmsolve-rs-ubuntu-latest-py${{ matrix.python-version }}
          path: packages/ssmsolve-rs/dist

      - name: Run tests
        run: |
          uv run --isolated --no-project \
            --with packages/ssmsolve-rs/dist/*.whl \
            --with "packages/ssmsolve[jit]" \
            --with pytest \
            pytest packages/ssmsolve/tests/ -v
