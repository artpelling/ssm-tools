name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install OpenBLAS
        run: sudo apt-get install -y libopenblas-dev patchelf

      - name: Build ssmsolve-rs wheel
        working-directory: packages/ssmsolve-rs
        run: uv run maturin build --release --out dist

      - name: Run tests
        run: |
          uv run --isolated --no-project \
            --with packages/ssmsolve-rs/dist/*.whl \
            --with "packages/ssmsolve[jit]" \
            --with pytest \
            pytest packages/ssmsolve/tests/ -v
