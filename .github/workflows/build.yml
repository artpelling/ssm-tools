name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          path: ssm-tools

      - uses: actions/checkout@v6
        with:
          repository: artpelling/ssmsolvers
          path: ssmsolvers

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install OpenBLAS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libopenblas-dev patchelf

      - name: Install OpenBLAS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install openblas:x64-windows
          "BLAS_LIB_DIR=C:\vcpkg\installed\x64-windows\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\vcpkg\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build ssmsolvers wheel
        working-directory: ssmsolvers
        run: uv run maturin build --release --out dist

      - name: Smoke test ssmsolvers
        working-directory: ssmsolvers
        run: uv run --isolated --no-project --with dist/*.whl python -c "from ssmsolvers import solve_f32, solve_f64; print('ssmsolvers OK')"

      - name: Install ssmsolve workspace
        working-directory: ssm-tools
        run: uv sync --all-packages --no-install-package ssmsolvers

      - name: Smoke test ssmsolve
        working-directory: ssm-tools
        run: uv run --isolated --no-project --with ../ssmsolvers/dist/*.whl --with packages/ssmsolve python -c "from ssmsolve.models import StateSpaceModel; print('ssmsolve OK')"

