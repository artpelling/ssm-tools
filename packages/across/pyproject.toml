[project]
name = "across"
version = "0.1.0"
description = "Python package for the construction of reduced order state space models from impulse response data."
readme = "README.md"
authors = [
    { name = "Art Pelling", email = "a.pelling@tu-berlin.de" }
]
requires-python = ">=3.12"
dependencies = [
    "pyfar@git+https://github.com/pyfar/pyfar.git@state-space-systems",
    "pymor@git+https://github.com/pymor/pymor.git@d2bde7ba4e486580887ab910b15e2f5992b91f41",
    "rocket-fft",
]
license = "MIT"

[build-system]
requires = ["uv-build>=0.11.17,<0.12"]
build-backend = "uv_build"

[tool.hatch.metadata]
allow-direct-references = true
