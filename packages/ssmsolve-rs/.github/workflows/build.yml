name: Build & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      # BLAS setup — platform-specific.
      # Linux: libopenblas-dev exposes a pkg-config entry picked up by build.rs.
      # macOS: build.rs links the Accelerate framework automatically — no setup needed.
      # Windows: vcpkg provides MSVC-compatible import libraries; BLAS_LIB_DIR
      #          triggers the env-override branch in build.rs (step 1 of 4).
      - name: Install OpenBLAS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libopenblas-dev patchelf

      - name: Install OpenBLAS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install openblas:x64-windows
          "BLAS_LIB_DIR=C:\vcpkg\installed\x64-windows\lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\vcpkg\installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist

      - name: Smoke test
        run: uv run --isolated --no-project --with dist/*.whl python -c "from ssmsolvers import solve_f32, solve_f64; print('OK')"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

