[project]
name = "ssmsolve"
version = "0.1.0"
description = "State-space systems for acoustic applications."
readme = "README.md"
authors = [
    { name = "Art Pelling", email = "a.pelling@tu-berlin.de" }
]
requires-python = ">=3.12"
dependencies = [
    "numpy>=2",
    "pyfar@git+https://github.com/pyfar/pyfar.git@state-space-models",
]

[project.optional-dependencies]
rust = ["ssmsolve-rs"]
jit = ["numba"]
full = ["across", "irdl", "ssmsolve[rust,jit]"]

[project.scripts]
reduce-fabian = "ssmsolve.scripts.reduce_fabian:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true
